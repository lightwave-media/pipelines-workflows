name: Pipelines
run-name: "Plan — ${{ inputs.working_directory }}"

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: '"ubuntu-latest"'
        description: "JSON-encoded runner label (e.g. '\"ubuntu-latest\"' or '[\"self-hosted\",\"linux\"]')"
      working_directory:
        type: string
        required: true
        description: "Repo-relative path to the Terragrunt environment dir (e.g. non-prod/us-east-1)"
      aws_region:
        type: string
        default: "us-east-1"
      tg_bucket_prefix:
        type: string
        default: "lightwave-"
        description: "Prefix used for Terragrunt S3 state buckets"
      cloudflare_ssm_param:
        type: string
        default: "/lightwave/prod/CLOUDFLARE_API_TOKEN"
        description: "SSM parameter path for the Cloudflare API token"
    secrets:
      INFRASTRUCTURE_CATALOG_TOKEN:
        required: true
      AWS_GITHUB_ACTIONS_ROLE_ARN:
        required: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TG_BUCKET_PREFIX: ${{ inputs.tg_bucket_prefix }}
  AWS_REGION: ${{ inputs.aws_region }}

jobs:
  preflight:
    name: Preflight
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Validate required secrets
        shell: bash
        env:
          CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
          AWS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
        run: |
          missing=()
          [[ -z "$CATALOG_TOKEN" ]] && missing+=("INFRASTRUCTURE_CATALOG_TOKEN")
          [[ -z "$AWS_ROLE_ARN" ]]  && missing+=("AWS_GITHUB_ACTIONS_ROLE_ARN")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify branch is up-to-date with main
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git merge-base --is-ancestor origin/main "$HEAD_SHA"; then
            echo "::error::Branch is not up to date with main — rebase before re-running"
            exit 1
          fi

  detect-units:
    name: Detect Changed Units
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: preflight
    outputs:
      units: ${{ steps.detect.outputs.units }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Detect changed Terragrunt units
        id: detect
        shell: bash
        run: |
          cd "${{ inputs.working_directory }}"
          UNITS=$(ROOT_DIR="." bash "${GITHUB_WORKSPACE}/scripts/find-changed-units.sh")
          echo "units=$UNITS" >> "$GITHUB_OUTPUT"
          echo "Detected units:"
          echo "$UNITS" | jq .

      - name: Post initial PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pipelines-detect-${{ github.event.pull_request.head.sha }}
          message: |
            ## 🔄 Detecting infrastructure changes…

            Scanning `${{ inputs.working_directory }}` for changed Terragrunt units.

  plan:
    name: "Plan — ${{ matrix.unit.path }}"
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: detect-units
    if: fromJson(needs.detect-units.outputs.units)[0] != null
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.detect-units.outputs.units) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Plan-${{ matrix.unit.id }}"

      - name: Fetch Cloudflare token from SSM
        shell: bash
        run: |
          CLOUDFLARE_API_TOKEN=$(aws ssm get-parameter \
            --name "${{ inputs.cloudflare_ssm_param }}" \
            --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"

      - name: Terragrunt Plan
        id: plan
        shell: bash
        working-directory: ${{ matrix.unit.path }}
        run: |
          set +e
          mkdir -p /tmp/plans/${{ matrix.unit.id }}

          terragrunt plan \
            --non-interactive \
            --out /tmp/plans/${{ matrix.unit.id }}/plan.tfplan \
            2>&1 | tee /tmp/plan-output-${{ matrix.unit.id }}.txt

          PLAN_EXIT="${PIPESTATUS[0]}"

          echo "plan_exit=$PLAN_EXIT" >> "$GITHUB_OUTPUT"

          echo "plan_output<<EOF" >> "$GITHUB_OUTPUT"
          tail -c 60000 /tmp/plan-output-${{ matrix.unit.id }}.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if grep -qE "will be destroyed|must be replaced|Plan: .* to destroy" \
              /tmp/plan-output-${{ matrix.unit.id }}.txt; then
            echo "has_dangerous_ops=true" >> "$GITHUB_OUTPUT"
            echo "dangerous_ops<<EOF" >> "$GITHUB_OUTPUT"
            grep -E -A 2 "will be destroyed|must be replaced" \
              /tmp/plan-output-${{ matrix.unit.id }}.txt >> "$GITHUB_OUTPUT" || true
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_dangerous_ops=false" >> "$GITHUB_OUTPUT"
          fi

          exit "$PLAN_EXIT"
        env:
          TG_BUCKET_PREFIX: ${{ env.TG_BUCKET_PREFIX }}

      - name: Upload plan artifact
        if: steps.plan.outputs.plan_exit == '0'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tg-plan-${{ matrix.unit.id }}
          path: /tmp/plans/${{ matrix.unit.id }}/
          retention-days: 1
          if-no-files-found: ignore

      - name: Post plan result to PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pipelines-plan-${{ github.event.pull_request.head.sha }}-${{ matrix.unit.id }}
          message: |
            ### ${{ steps.plan.outputs.plan_exit == '0' && '✅' || '❌' }} Plan — `${{ matrix.unit.path }}`

            ${{ steps.plan.outputs.has_dangerous_ops == 'true' && '### ⚠️ DESTRUCTIVE OPERATIONS DETECTED — Review carefully!' || '' }}

            <details>
            <summary>📋 Plan output</summary>

            ```
            ${{ steps.plan.outputs.plan_output }}
            ```

            </details>

            **Unit:** `${{ matrix.unit.path }}`
            **Triggered by:** @${{ github.actor }} · `${{ github.sha }}`

  summary:
    name: Plan Summary
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: [detect-units, plan]
    if: always()
    steps:
      - name: Summarise results
        shell: bash
        run: |
          echo "## 📊 Pipelines Plan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**Directory:** \`${{ inputs.working_directory }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.detect-units.result }}" != "success" ]]; then
            echo "❌ Change detection failed" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          UNITS='${{ needs.detect-units.outputs.units }}'
          COUNT=$(echo "$UNITS" | jq 'length')

          if [[ "$COUNT" == "0" ]]; then
            echo "⏭️  No changed Terragrunt units detected in \`${{ inputs.working_directory }}\`" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ "${{ needs.plan.result }}" == "success" ]]; then
            echo "✅ All $COUNT unit plan(s) passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ One or more plan jobs failed — check individual job logs" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
