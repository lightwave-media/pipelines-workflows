name: Unlock State
run-name: "Unlock — ${{ inputs.unit_path || inputs.working_directory }}"

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: '"ubuntu-latest"'
        description: "JSON-encoded runner label"
      working_directory:
        type: string
        required: true
        description: "Repo-relative path to the Terragrunt environment dir (e.g. prod/us-east-1)"
      unit_path:
        type: string
        default: ""
        description: "Relative path to a single unit under working_directory. Empty = unlock all units."
      lock_id:
        type: string
        default: ""
        description: "Specific lock ID to release. Empty = auto-detect from plan output."
      aws_region:
        type: string
        default: "us-east-1"
      tg_bucket_prefix:
        type: string
        default: "lightwave-"
    secrets:
      INFRASTRUCTURE_CATALOG_TOKEN:
        required: true
      AWS_GITHUB_ACTIONS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write

env:
  TG_BUCKET_PREFIX: ${{ inputs.tg_bucket_prefix }}
  AWS_REGION: ${{ inputs.aws_region }}

jobs:
  discover-targets:
    name: Discover Unlock Targets
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      units: ${{ steps.discover.outputs.units }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Discover units to unlock
        id: discover
        shell: bash
        run: |
          if [[ -n "${{ inputs.unit_path }}" ]]; then
            # Single unit
            UNIT_PATH="${{ inputs.working_directory }}/${{ inputs.unit_path }}"
            UNIT_ID=$(echo "${{ inputs.unit_path }}" | sed 's|/|-|g')
            UNITS=$(jq -cn --arg id "$UNIT_ID" --arg path "$UNIT_PATH" '[{id: $id, path: $path}]')
          else
            # All units in working_directory
            cd "${{ inputs.working_directory }}"
            WD="${{ inputs.working_directory }}"
            UNITS=$(ROOT_DIR="." bash "${GITHUB_WORKSPACE}/scripts/find-all-units.sh" | \
              jq --arg wd "$WD" '[.[] | {id: .id, path: ($wd + "/" + .path)}]')
          fi
          echo "units=$UNITS" >> "$GITHUB_OUTPUT"
          echo "Unlock targets:"
          echo "$UNITS" | jq .

  unlock:
    name: "Unlock — ${{ matrix.unit.path }}"
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: discover-targets
    if: fromJson(needs.discover-targets.outputs.units)[0] != null
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.discover-targets.outputs.units) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Unlock-${{ matrix.unit.id }}"

      - name: Force-unlock state
        shell: bash
        working-directory: ${{ matrix.unit.path }}
        run: |
          LOCK_ID="${{ inputs.lock_id }}"

          if [[ -n "$LOCK_ID" ]]; then
            echo "Unlocking ${{ matrix.unit.path }} with lock ID $LOCK_ID"
            terragrunt force-unlock --force "$LOCK_ID"
          else
            echo "No lock ID provided — detecting active lock via plan..."
            set +e
            OUTPUT=$(terragrunt plan --non-interactive 2>&1)
            PLAN_EXIT=$?
            set -e

            if [[ $PLAN_EXIT -eq 0 ]]; then
              echo "ℹ️  No active lock on ${{ matrix.unit.path }} (plan succeeded)"
              exit 0
            fi

            DETECTED_ID=$(echo "$OUTPUT" | grep -oE 'ID:[[:space:]]+[a-f0-9-]{36}' | awk '{print $2}' | head -1)

            if [[ -z "$DETECTED_ID" ]]; then
              echo "::error::Could not detect lock ID from plan output. Provide lock_id input explicitly."
              echo "$OUTPUT"
              exit 1
            fi

            echo "Detected lock ID: $DETECTED_ID"
            terragrunt force-unlock --force "$DETECTED_ID"
          fi
        env:
          TG_BUCKET_PREFIX: ${{ env.TG_BUCKET_PREFIX }}

      - name: Post unlock summary
        if: always()
        shell: bash
        run: |
          echo "## 🔓 Unlock — \`${{ matrix.unit.path }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Lock ID:** \`${{ inputs.lock_id || '(auto-detected)' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
