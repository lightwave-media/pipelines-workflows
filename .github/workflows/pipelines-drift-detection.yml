name: Drift Detection
run-name: "Drift Detection — ${{ inputs.working_directory }}"

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: '"ubuntu-latest"'
        description: "JSON-encoded runner label"
      working_directory:
        type: string
        required: true
        description: "Repo-relative path to the Terragrunt environment dir (e.g. prod/us-east-1)"
      aws_region:
        type: string
        default: "us-east-1"
      tg_bucket_prefix:
        type: string
        default: "lightwave-"
      cloudflare_ssm_param:
        type: string
        default: "/lightwave/prod/CLOUDFLARE_API_TOKEN"
      create_issue_on_drift:
        type: boolean
        default: true
        description: "Open a GitHub issue when drift is detected"
    secrets:
      INFRASTRUCTURE_CATALOG_TOKEN:
        required: true
      AWS_GITHUB_ACTIONS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TG_BUCKET_PREFIX: ${{ inputs.tg_bucket_prefix }}
  AWS_REGION: ${{ inputs.aws_region }}

jobs:
  discover-units:
    name: Discover All Units
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      units: ${{ steps.discover.outputs.units }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Discover all Terragrunt units
        id: discover
        shell: bash
        run: |
          cd "${{ inputs.working_directory }}"
          UNITS=$(ROOT_DIR="." bash "${GITHUB_WORKSPACE}/scripts/find-all-units.sh")
          echo "units=$UNITS" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$UNITS" | jq 'length')
          echo "Discovered $COUNT units:"
          echo "$UNITS" | jq .

  plan:
    name: "Plan — ${{ matrix.unit.path }}"
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: discover-units
    if: fromJson(needs.discover-units.outputs.units)[0] != null
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.discover-units.outputs.units) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Drift-${{ matrix.unit.id }}"

      - name: Fetch Cloudflare token from SSM
        shell: bash
        run: |
          CLOUDFLARE_API_TOKEN=$(aws ssm get-parameter \
            --name "${{ inputs.cloudflare_ssm_param }}" \
            --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"

      - name: Terragrunt Plan (drift check)
        id: plan
        shell: bash
        working-directory: ${{ matrix.unit.path }}
        run: |
          set +e
          terragrunt plan \
            --non-interactive \
            --detailed-exitcode \
            2>&1 | tee /tmp/drift-output-${{ matrix.unit.id }}.txt

          PLAN_EXIT="${PIPESTATUS[0]}"
          # exit code 2 = changes present (drift); 0 = no changes; 1 = error
          echo "plan_exit=$PLAN_EXIT" >> "$GITHUB_OUTPUT"

          DRIFTED="false"
          [[ "$PLAN_EXIT" == "2" ]] && DRIFTED="true"
          echo "drifted=$DRIFTED" >> "$GITHUB_OUTPUT"

          # Always exit 0 so matrix completes; report job aggregates results
          exit 0
        env:
          TG_BUCKET_PREFIX: ${{ env.TG_BUCKET_PREFIX }}

      - name: Upload drift output
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: drift-result-${{ matrix.unit.id }}
          path: /tmp/drift-output-${{ matrix.unit.id }}.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Write drift marker
        if: steps.plan.outputs.drifted == 'true'
        shell: bash
        run: |
          mkdir -p /tmp/drift-markers
          echo "${{ matrix.unit.path }}" > /tmp/drift-markers/${{ matrix.unit.id }}.drift
          echo "::warning::Drift detected in ${{ matrix.unit.path }}"

      - name: Upload drift marker
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: steps.plan.outputs.drifted == 'true'
        with:
          name: drift-marker-${{ matrix.unit.id }}
          path: /tmp/drift-markers/${{ matrix.unit.id }}.drift
          retention-days: 1

  report:
    name: Drift Report
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: [discover-units, plan]
    if: always()
    steps:
      - name: Download all drift markers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          pattern: drift-marker-*
          path: /tmp/drift-markers/
          merge-multiple: true
        continue-on-error: true

      - name: Summarise drift
        id: summary
        shell: bash
        run: |
          DRIFTED_UNITS=()
          if ls /tmp/drift-markers/*.drift 2>/dev/null; then
            while IFS= read -r f; do
              DRIFTED_UNITS+=("$(cat "$f")")
            done < <(find /tmp/drift-markers -name "*.drift")
          fi

          COUNT="${#DRIFTED_UNITS[@]}"
          echo "drift_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [[ "$COUNT" -gt 0 ]]; then
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            echo "drifted_units<<EOF" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${DRIFTED_UNITS[@]}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          fi

          echo "## 🔍 Drift Detection Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Directory:** \`${{ inputs.working_directory }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$COUNT" -gt 0 ]]; then
            echo "### ⚠️ Drift Detected in $COUNT unit(s)" >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "${DRIFTED_UNITS[@]}" | while read -r u; do
              echo "- \`$u\`" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "### ✅ No drift detected" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open GitHub issue for drift
        if: steps.summary.outputs.has_drift == 'true' && inputs.create_issue_on_drift
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const units = `${{ steps.summary.outputs.drifted_units }}`;
            const unitList = units.trim().split('\n').map(u => `- \`${u}\``).join('\n');
            const body = [
              '## Infrastructure Drift Detected',
              '',
              `**Directory:** \`${{ inputs.working_directory }}\``,
              `**Detected by:** [Run ${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              '',
              '### Drifted Units',
              unitList,
              '',
              '### Next Steps',
              '1. Review plan output in the workflow run linked above.',
              '2. Apply changes via a PR against the infrastructure-live repo.',
              '3. Close this issue once drift is resolved.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Drift detected in ${{ inputs.working_directory }} (${{ steps.summary.outputs.drift_count }} unit(s))`,
              body,
              labels: ['drift', 'infrastructure'],
            });

      - name: Fail on drift
        if: steps.summary.outputs.has_drift == 'true'
        shell: bash
        run: |
          echo "❌ Drift detected in ${{ steps.summary.outputs.drift_count }} unit(s)"
          exit 1
