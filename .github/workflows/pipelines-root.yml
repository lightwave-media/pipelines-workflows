name: Pipelines
run-name: "Apply — ${{ inputs.working_directory }}"

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: '"ubuntu-latest"'
        description: "JSON-encoded runner label"
      working_directory:
        type: string
        required: true
        description: "Repo-relative path to the Terragrunt environment dir (e.g. prod/us-east-1)"
      aws_region:
        type: string
        default: "us-east-1"
      tg_bucket_prefix:
        type: string
        default: "lightwave-"
      cloudflare_ssm_param:
        type: string
        default: "/lightwave/prod/CLOUDFLARE_API_TOKEN"
      environment:
        type: string
        default: ""
        description: "GitHub Environment name for the apply approval gate (leave empty to skip gate)"
    secrets:
      INFRASTRUCTURE_CATALOG_TOKEN:
        required: true
      AWS_GITHUB_ACTIONS_ROLE_ARN:
        required: true

permissions:
  contents: read
  pull-requests: write
  id-token: write
  actions: read

env:
  TG_BUCKET_PREFIX: ${{ inputs.tg_bucket_prefix }}
  AWS_REGION: ${{ inputs.aws_region }}

jobs:
  detect-units:
    name: Detect Changed Units
    runs-on: ${{ fromJSON(inputs.runner) }}
    outputs:
      units: ${{ steps.detect.outputs.units }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Detect changed Terragrunt units
        id: detect
        shell: bash
        run: |
          cd "${{ inputs.working_directory }}"
          # On push to main compare last commit; SOURCE_REF=HEAD^ TARGET_REF=HEAD
          UNITS=$(SOURCE_REF="HEAD^" TARGET_REF="HEAD" ROOT_DIR="." \
            bash "${GITHUB_WORKSPACE}/scripts/find-changed-units.sh")
          echo "units=$UNITS" >> "$GITHUB_OUTPUT"
          echo "Detected units:"
          echo "$UNITS" | jq .

  plan:
    name: "Plan — ${{ matrix.unit.path }}"
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: detect-units
    if: fromJson(needs.detect-units.outputs.units)[0] != null
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.detect-units.outputs.units) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-PreApplyPlan-${{ matrix.unit.id }}"

      - name: Fetch Cloudflare token from SSM
        shell: bash
        run: |
          CLOUDFLARE_API_TOKEN=$(aws ssm get-parameter \
            --name "${{ inputs.cloudflare_ssm_param }}" \
            --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"

      - name: Terragrunt Plan (pre-apply)
        id: plan
        shell: bash
        working-directory: ${{ matrix.unit.path }}
        run: |
          mkdir -p /tmp/plans/${{ matrix.unit.id }}
          terragrunt plan \
            --non-interactive \
            --out /tmp/plans/${{ matrix.unit.id }}/plan.tfplan \
            2>&1 | tee /tmp/plan-output-${{ matrix.unit.id }}.txt
        env:
          TG_BUCKET_PREFIX: ${{ env.TG_BUCKET_PREFIX }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tg-plan-${{ matrix.unit.id }}
          path: /tmp/plans/${{ matrix.unit.id }}/
          retention-days: 1
          if-no-files-found: error

  apply:
    name: "Apply — ${{ matrix.unit.path }}"
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: [detect-units, plan]
    if: fromJson(needs.detect-units.outputs.units)[0] != null
    # GitHub Environment triggers the approval gate for prod; leave empty for non-prod auto-apply
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.detect-units.outputs.units) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure git module auth
        shell: bash
        env:
          INFRASTRUCTURE_CATALOG_TOKEN: ${{ secrets.INFRASTRUCTURE_CATALOG_TOKEN }}
        run: bash scripts/git-code-auth.sh

      - name: Setup toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "GitHubActions-Apply-${{ matrix.unit.id }}"

      - name: Fetch Cloudflare token from SSM
        shell: bash
        run: |
          CLOUDFLARE_API_TOKEN=$(aws ssm get-parameter \
            --name "${{ inputs.cloudflare_ssm_param }}" \
            --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$CLOUDFLARE_API_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"

      - name: Download plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: tg-plan-${{ matrix.unit.id }}
          path: /tmp/plans/${{ matrix.unit.id }}/

      - name: Terragrunt Apply
        id: apply
        shell: bash
        working-directory: ${{ matrix.unit.path }}
        run: |
          set +e
          terragrunt apply \
            --non-interactive \
            /tmp/plans/${{ matrix.unit.id }}/plan.tfplan \
            2>&1 | tee /tmp/apply-output-${{ matrix.unit.id }}.txt

          APPLY_EXIT="${PIPESTATUS[0]}"

          echo "apply_exit=$APPLY_EXIT" >> "$GITHUB_OUTPUT"
          echo "apply_output<<EOF" >> "$GITHUB_OUTPUT"
          tail -c 60000 /tmp/apply-output-${{ matrix.unit.id }}.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          exit "$APPLY_EXIT"
        env:
          TG_BUCKET_PREFIX: ${{ env.TG_BUCKET_PREFIX }}

      - name: Post apply summary
        if: always()
        shell: bash
        run: |
          STATUS="${{ steps.apply.outputs.apply_exit == '0' && '✅ Succeeded' || '❌ Failed' }}"
          echo "## 🚀 Apply — \`${{ matrix.unit.path }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** $STATUS" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** \`${{ inputs.environment || 'none' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by:** @${{ github.actor }} · \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  status-check:
    name: Apply Status Check
    runs-on: ${{ fromJSON(inputs.runner) }}
    needs: [detect-units, plan, apply]
    if: always()
    steps:
      - name: Check for failures
        shell: bash
        run: |
          PLAN_RESULT="${{ needs.plan.result }}"
          APPLY_RESULT="${{ needs.apply.result }}"

          if [[ "$PLAN_RESULT" == "failure" || "$APPLY_RESULT" == "failure" ]]; then
            echo "❌ Pipeline failed (plan=$PLAN_RESULT, apply=$APPLY_RESULT)"
            exit 1
          fi

          echo "✅ Pipeline passed (plan=$PLAN_RESULT, apply=$APPLY_RESULT)"
